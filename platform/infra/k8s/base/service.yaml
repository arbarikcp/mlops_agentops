apiVersion: v1
kind: Service
metadata:
  name: credit-risk-api
  namespace: ml-serving
  labels:
    app: credit-risk-api
spec:
  type: ClusterIP
  selector:
    app: credit-risk-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
---
# NodePort for local kind cluster access
apiVersion: v1
kind: Service
metadata:
  name: credit-risk-api-nodeport
  namespace: ml-serving
  labels:
    app: credit-risk-api
spec:
  type: NodePort
  selector:
    app: credit-risk-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
      nodePort: 30080
