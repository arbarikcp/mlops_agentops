apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "credit-risk.fullname" . }}
  labels:
    {{- include "credit-risk.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "credit-risk.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "credit-risk.selectorLabels" . | nindent 8 }}
    spec:
      initContainers:
        - name: model-downloader
          image: amazon/aws-cli:2.15.0
          command:
            - aws
            - s3
            - cp
            - {{ .Values.config.modelS3Path | quote }}
            - /model/model.pkl
          volumeMounts:
            - name: model-volume
              mountPath: /model
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: MLFLOW_TRACKING_URI
              value: {{ .Values.config.mlflowUri | quote }}
            - name: MODEL_VERSION
              value: {{ .Values.config.modelVersion | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: 8080
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: 8080
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          volumeMounts:
            - name: model-volume
              mountPath: /model
      volumes:
        - name: model-volume
          emptyDir: {}
